name: vercel-production-deploy

on:
  # Manual fallback only. Production auto-deploys through the Vercel GitHub App;
  # keeping this off push avoids failed checks when GitHub Actions deploy secrets
  # are not configured.
  workflow_dispatch:

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN secret" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID secret" && exit 1)

      - run: npm ci
      - run: npm test
      - run: npm run privacy:check
      - run: npm run release:check
      - run: npm audit --omit=dev --audit-level=high

      - name: Pull Vercel production environment
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production output
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production output
        id: deploy
        run: |
          set -euo pipefail
          deployment_url="$(npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tee deployment-output.txt | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
          test -n "$deployment_url"
          printf "%s\n" "$deployment_url" > deployment-url.txt
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Record deployment evidence
        run: |
          node -e "const fs=require('fs'); const deploymentUrl=fs.readFileSync('deployment-url.txt','utf8').trim(); const evidence={schema:'trust402.github_actions_deploy_evidence.v1', repository:process.env.GITHUB_REPOSITORY, workflow:process.env.GITHUB_WORKFLOW, runId:process.env.GITHUB_RUN_ID, runAttempt:process.env.GITHUB_RUN_ATTEMPT, runUrl:process.env.GITHUB_SERVER_URL+'/'+process.env.GITHUB_REPOSITORY+'/actions/runs/'+process.env.GITHUB_RUN_ID, event:process.env.GITHUB_EVENT_NAME, ref:process.env.GITHUB_REF, headSha:process.env.GITHUB_SHA, deploymentUrl, productionAlias:'https://trust402.vercel.app', generatedAt:new Date().toISOString()}; fs.writeFileSync('deployment-evidence.json', JSON.stringify(evidence,null,2));"
          {
            echo "### Trust402 production deploy evidence"
            echo ""
            echo "- Run URL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Commit SHA: $GITHUB_SHA"
            echo "- Deployment URL: $(cat deployment-url.txt)"
            echo "- Production alias: https://trust402.vercel.app"
            echo ""
            echo "Suggested production env after all checks pass:"
            echo ""
            echo '```text'
            echo "TRUST402_GIT_AUTO_DEPLOY_VERIFIED=true"
            echo "TRUST402_GIT_AUTO_DEPLOY_EVIDENCE_URL=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "TRUST402_GIT_AUTO_DEPLOY_COMMIT_SHA=$GITHUB_SHA"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke deployment URL
        run: npm run smoke -- "${{ steps.deploy.outputs.url }}"

      - name: Smoke production alias
        run: |
          npm run smoke -- https://trust402.vercel.app
          npm run smoke:x402 -- https://trust402.vercel.app

      - name: Production launch monitor
        run: npm run launch:monitor -- https://trust402.vercel.app --timeout-ms=10000 --skip-directories --strict

      - name: Upload deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: trust402-deployment-evidence
          path: |
            deployment-url.txt
            deployment-evidence.json
          if-no-files-found: error
          retention-days: 30
